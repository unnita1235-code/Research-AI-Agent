# Fully automated: lint-free install + import checks + tests on every push/PR
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TAVILY_API_KEY: ci-synthetic-tavily-key-xxxxxxxx
  ANTHROPIC_API_KEY: ""
  LLM_PROVIDER: heuristic
  ENABLE_SUGGEST_TOPICS: "0"
  ENABLE_JOB_DB: "0"
  RATE_LIMIT_PER_MIN: "0"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Byte-compile (catch syntax errors)
        run: |
          python -m compileall -q -f main.py graph.py nodes.py state.py job_store.py research_extras.py research_options.py
          python -m compileall -q -f tests

      - name: Run tests
        run: python -m pytest
